<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulasi USP Sejarah</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap');

  :root {
    --navy: #0f1f3d;
    --navy2: #1a2f52;
    --gold: #c9a84c;
    --gold2: #e8c96a;
    --cream: #faf6ee;
    --green: #1a6644;
    --green-light: #e8f5ee;
    --red: #8b1a1a;
    --red-light: #fdf0f0;
    --gray: #6b7280;
    --border: #ddd5c0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--navy);
    min-height: 100vh;
  }

  /* ── SCREENS ── */
  .screen { display: none; }
  .screen.active { display: block; }

  /* ── START SCREEN ── */
  #start-screen {
    min-height: 100vh;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    background: var(--navy);
    position: relative;
    overflow: hidden;
  }
  #start-screen.active { display: flex; }

  #start-screen::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 30% 20%, rgba(201,168,76,0.15) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 80%, rgba(201,168,76,0.08) 0%, transparent 50%);
  }

  .start-badge {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--gold);
    border: 1px solid var(--gold);
    padding: 0.4rem 1rem;
    border-radius: 2px;
    margin-bottom: 2rem;
    position: relative;
    z-index: 1;
  }

  .start-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 6vw, 4rem);
    font-weight: 900;
    color: #fff;
    text-align: center;
    line-height: 1.1;
    position: relative;
    z-index: 1;
    margin-bottom: 0.5rem;
  }

  .start-title span { color: var(--gold); }

  .start-sub {
    color: rgba(255,255,255,0.5);
    font-size: 0.95rem;
    text-align: center;
    margin-bottom: 2.5rem;
    position: relative;
    z-index: 1;
  }

  .stats-row {
    display: flex;
    gap: 2rem;
    margin-bottom: 3rem;
    position: relative;
    z-index: 1;
  }

  .stat-box {
    text-align: center;
    border: 1px solid rgba(201,168,76,0.3);
    padding: 1rem 1.5rem;
    border-radius: 4px;
    background: rgba(255,255,255,0.04);
  }

  .stat-num {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    font-weight: 700;
    color: var(--gold);
    display: block;
  }

  .stat-label {
    font-size: 0.75rem;
    color: rgba(255,255,255,0.45);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  .btn-start {
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    color: var(--navy);
    background: var(--gold);
    border: none;
    padding: 1rem 3rem;
    border-radius: 3px;
    cursor: pointer;
    position: relative;
    z-index: 1;
    letter-spacing: 0.05em;
    transition: background 0.2s, transform 0.1s;
  }

  .btn-start:hover { background: var(--gold2); transform: translateY(-1px); }
  .btn-start:active { transform: translateY(0); }

  /* ── EXAM SCREEN ── */
  #exam-screen {
    min-height: 100vh;
    display: none;
    flex-direction: column;
  }
  #exam-screen.active { display: flex; }

  .exam-header {
    background: var(--navy);
    padding: 1rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    gap: 1rem;
  }

  .exam-logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--gold);
    white-space: nowrap;
  }

  .progress-wrap {
    flex: 1;
    max-width: 400px;
  }

  .progress-info {
    display: flex;
    justify-content: space-between;
    font-size: 0.75rem;
    color: rgba(255,255,255,0.5);
    margin-bottom: 0.3rem;
  }

  .progress-bar {
    height: 4px;
    background: rgba(255,255,255,0.1);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--gold);
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  .timer-box {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    color: #fff;
    font-size: 0.9rem;
    font-weight: 600;
    background: rgba(255,255,255,0.08);
    padding: 0.4rem 0.9rem;
    border-radius: 3px;
    white-space: nowrap;
  }

  .timer-box.warning { color: #f59e0b; }
  .timer-box.danger { color: #ef4444; animation: pulse 1s infinite; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }

  /* ── QUESTION AREA ── */
  .exam-body {
    flex: 1;
    max-width: 800px;
    width: 100%;
    margin: 0 auto;
    padding: 2rem 1.5rem 6rem;
  }

  .q-counter {
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 0.5rem;
  }

  .q-instruction {
    font-size: 0.85rem;
    color: #d97706;
    font-weight: 600;
    margin-bottom: 1.2rem;
    background: #fef3c7;
    padding: 0.5rem 1rem;
    border-radius: 4px;
    display: inline-block;
  }

  .q-text {
    font-size: 1.05rem;
    line-height: 1.7;
    color: var(--navy);
    margin-bottom: 1.8rem;
    font-weight: 400;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
  }

  .option {
    display: flex;
    align-items: flex-start;
    gap: 1rem;
    padding: 1rem 1.2rem;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
    background: #fff;
    text-align: left;
  }

  .option:hover:not(.disabled) {
    border-color: var(--gold);
    background: #fffdf5;
  }

  .option.selected {
    border-color: var(--navy);
    background: #f0f4ff;
  }

  .option.correct {
    border-color: var(--green);
    background: var(--green-light);
  }

  .option.wrong {
    border-color: var(--red);
    background: var(--red-light);
  }

  .option.disabled { cursor: default; }

  .opt-letter {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--cream);
    border: 1.5px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.8rem;
    font-weight: 600;
    flex-shrink: 0;
    margin-top: 1px;
    transition: all 0.15s;
    color: var(--navy);
  }

  .option.selected .opt-letter { background: var(--navy); color: #fff; border-color: var(--navy); }
  .option.correct .opt-letter { background: var(--green); color: #fff; border-color: var(--green); }
  .option.wrong .opt-letter { background: var(--red); color: #fff; border-color: var(--red); }

  .opt-text {
    font-size: 0.95rem;
    line-height: 1.5;
    color: var(--navy);
  }

  .feedback-box {
    margin-top: 1.2rem;
    padding: 0.9rem 1.2rem;
    border-radius: 6px;
    font-size: 0.9rem;
    line-height: 1.5;
    display: none;
  }

  .feedback-box.correct { background: var(--green-light); border-left: 4px solid var(--green); color: var(--green); display: block; }
  .feedback-box.wrong { background: var(--red-light); border-left: 4px solid var(--red); color: var(--red); display: block; }

  /* ── NAV ── */
  .exam-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: #fff;
    border-top: 1px solid var(--border);
    padding: 1rem 2rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 100;
  }

  .btn-nav {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    padding: 0.7rem 1.8rem;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
    border: 1.5px solid;
  }

  .btn-prev {
    background: transparent;
    border-color: var(--border);
    color: var(--gray);
  }
  .btn-prev:hover:not(:disabled) { border-color: var(--navy); color: var(--navy); }
  .btn-prev:disabled { opacity: 0.3; cursor: default; }

  .btn-next {
    background: var(--navy);
    border-color: var(--navy);
    color: #fff;
  }
  .btn-next:hover { background: var(--navy2); }

  .btn-submit {
    background: var(--gold);
    border-color: var(--gold);
    color: var(--navy);
    font-weight: 700;
  }
  .btn-submit:hover { background: var(--gold2); }

  .nav-dots {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 300px;
  }

  .nav-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--border);
    cursor: pointer;
    transition: background 0.15s;
    border: none;
  }
  .nav-dot.answered { background: var(--navy); }
  .nav-dot.current { background: var(--gold); transform: scale(1.3); }
  .nav-dot.correct-dot { background: var(--green); }
  .nav-dot.wrong-dot { background: var(--red); }

  /* ── RESULT SCREEN ── */
  #result-screen {
    min-height: 100vh;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    background: var(--navy);
    position: relative;
    overflow: hidden;
  }
  #result-screen.active { display: flex; }
  #result-screen::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 30%, rgba(201,168,76,0.12) 0%, transparent 60%);
  }

  .result-card {
    background: var(--cream);
    border-radius: 12px;
    padding: 3rem;
    max-width: 600px;
    width: 100%;
    text-align: center;
    position: relative;
    z-index: 1;
  }

  .result-grade {
    font-family: 'Playfair Display', serif;
    font-size: 5rem;
    font-weight: 900;
    line-height: 1;
    margin-bottom: 0.5rem;
  }

  .result-label {
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gray);
    margin-bottom: 1.5rem;
  }

  .result-verdict {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem;
    font-weight: 700;
    margin-bottom: 0.5rem;
  }

  .result-msg {
    color: var(--gray);
    font-size: 0.95rem;
    margin-bottom: 2rem;
    line-height: 1.6;
  }

  .result-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1rem;
    margin-bottom: 2rem;
  }

  .rs-box {
    padding: 1rem;
    border-radius: 6px;
    border: 1px solid var(--border);
  }

  .rs-num {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem;
    font-weight: 700;
    display: block;
  }

  .rs-label { font-size: 0.75rem; color: var(--gray); text-transform: uppercase; letter-spacing: 0.1em; }
  .rs-correct .rs-num { color: var(--green); }
  .rs-wrong .rs-num { color: var(--red); }
  .rs-skip .rs-num { color: var(--gold); }

  .btn-restart {
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    color: var(--navy);
    background: var(--gold);
    border: none;
    padding: 0.9rem 2.5rem;
    border-radius: 4px;
    cursor: pointer;
    margin-right: 0.8rem;
    transition: background 0.2s;
  }
  .btn-restart:hover { background: var(--gold2); }

  .btn-review {
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    color: var(--navy);
    background: transparent;
    border: 1.5px solid var(--border);
    padding: 0.9rem 2.5rem;
    border-radius: 4px;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .btn-review:hover { border-color: var(--navy); }

  /* ── REVIEW SCREEN ── */
  #review-screen {
    min-height: 100vh;
    display: none;
    flex-direction: column;
  }
  #review-screen.active { display: flex; }

  .review-header {
    background: var(--navy);
    padding: 1rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .review-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem;
    color: var(--gold);
  }

  .btn-back {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    color: rgba(255,255,255,0.7);
    background: transparent;
    border: 1px solid rgba(255,255,255,0.2);
    padding: 0.4rem 1rem;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-back:hover { color: #fff; border-color: rgba(255,255,255,0.5); }

  .review-body {
    max-width: 800px;
    width: 100%;
    margin: 0 auto;
    padding: 2rem 1.5rem;
  }

  .review-item {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1.5rem;
    margin-bottom: 1.2rem;
  }

  .review-item.rev-correct { border-left: 4px solid var(--green); }
  .review-item.rev-wrong { border-left: 4px solid var(--red); }
  .review-item.rev-skip { border-left: 4px solid var(--gold); }

  .review-q-num {
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }
  .rev-correct .review-q-num { color: var(--green); }
  .rev-wrong .review-q-num { color: var(--red); }
  .rev-skip .review-q-num { color: var(--gold); }

  .review-q-text {
    font-size: 0.95rem;
    line-height: 1.6;
    margin-bottom: 0.8rem;
    color: var(--navy);
  }

  .review-answers {
    font-size: 0.88rem;
    line-height: 1.8;
  }

  .rev-your { color: var(--red); }
  .rev-correct-ans { color: var(--green); font-weight: 600; margin-top: 0.5rem; }

  /* ── MEDIA QUERIES FOR MOBILE RESPONSIVENESS ── */
  @media (max-width: 768px) {
    /* Umum */
    body { font-size: 14px; }
    
    /* Start Screen */
    .start-title { font-size: 2.2rem; }
    .stats-row { flex-wrap: wrap; justify-content: center; gap: 1rem; }
    .stat-box { flex: 1 1 30%; min-width: 90px; padding: 0.8rem; }
    .btn-start { width: 100%; max-width: 300px; }

    /* Exam Header */
    .exam-header { flex-wrap: wrap; padding: 0.8rem 1rem; gap: 0.5rem; }
    .exam-logo { flex: 1; font-size: 1rem; }
    .timer-box { flex: 0 0 auto; font-size: 0.85rem; padding: 0.35rem 0.6rem; }
    .progress-wrap { order: 3; width: 100%; max-width: 100%; margin-top: 0.5rem; }

    /* Exam Body */
    .exam-body { padding: 1.5rem 1rem 9rem; } /* Tambah ruang bawah agar tidak tertutup nav */
    .q-text { font-size: 1rem; line-height: 1.5; }
    .option { padding: 0.8rem 1rem; gap: 0.8rem; }
    .opt-letter { width: 24px; height: 24px; font-size: 0.75rem; }
    .opt-text { font-size: 0.9rem; }

    /* Exam Nav - Dirombak agar susunannya tidak bertabrakan */
    .exam-nav { 
      flex-wrap: wrap; 
      padding: 0.8rem 1rem; 
      gap: 0.5rem; 
      justify-content: space-between;
    }
    .nav-dots {
      order: -1; /* Pindahkan navigasi dot ke atas tombol */
      width: 100%;
      max-width: 100%;
      margin-bottom: 0.5rem;
      max-height: 60px; /* Batasi tinggi dot agar tidak memenuhi layar */
      overflow-y: auto;
    }
    .btn-nav { 
      flex: 1; /* Tombol dibagi rata 50% kiri & kanan */
      text-align: center; 
      padding: 0.7rem 0.5rem; 
      font-size: 0.85rem; 
      white-space: nowrap;
    }
    .btn-prev { margin-right: 0.5rem; }

    /* Result Screen */
    .result-card { padding: 2rem 1.2rem; margin: 1rem; width: auto; }
    .result-grade { font-size: 4rem; }
    .result-stats { grid-template-columns: repeat(3, 1fr); gap: 0.5rem; }
    .rs-box { padding: 0.8rem 0.5rem; }
    .rs-num { font-size: 1.4rem; }
    
    /* Buat tombol akhir menyusun vertikal */
    .result-card > div:last-child { display: flex; flex-direction: column; gap: 0.8rem; }
    .btn-restart { margin-right: 0; width: 100%; }
    .btn-review { width: 100%; }

    /* Review Screen */
    .review-header { padding: 0.8rem 1rem; }
    .review-title { font-size: 1rem; }
    .review-body { padding: 1.5rem 1rem; }
    .review-item { padding: 1rem; }
  }
</style>
</head>
<body>

<div id="start-screen" class="screen active">
  <div class="start-badge">PSAJ · Sejarah</div>
  <h1 class="start-title">Simulasi<br><span>Ujian Sejarah</span></h1>
  <p class="start-sub">65 soal (Termasuk Pilihan Ganda Kompleks) · 90 menit</p>
  <div class="stats-row">
    <div class="stat-box"><span class="stat-num">65</span><span class="stat-label">Soal</span></div>
    <div class="stat-box"><span class="stat-num">90</span><span class="stat-label">Menit</span></div>
    <div class="stat-box"><span class="stat-num">100</span><span class="stat-label">Nilai Max</span></div>
  </div>
  <button class="btn-start" onclick="startExam()">Mulai Simulasi</button>
</div>

<div id="exam-screen" class="screen">
  <div class="exam-header">
    <div class="exam-logo">USP Sejarah</div>
    <div class="progress-wrap">
      <div class="progress-info">
        <span id="q-progress">Soal 1 / 65</span>
        <span id="q-answered">0 dijawab</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    </div>
    <div class="timer-box" id="timer-box">⏱ 90:00</div>
  </div>

  <div class="exam-body" id="exam-body"></div>

  <div class="exam-nav">
    <button class="btn-nav btn-prev" id="btn-prev" onclick="navigate(-1)" disabled>← Sebelumnya</button>
    <div class="nav-dots" id="nav-dots"></div>
    <button class="btn-nav btn-next" id="btn-next" onclick="navigate(1)">Berikutnya →</button>
  </div>
</div>

<div id="result-screen" class="screen">
  <div class="result-card">
    <div class="result-grade" id="result-grade">—</div>
    <div class="result-label">Nilai Akhir</div>
    <div class="result-verdict" id="result-verdict">—</div>
    <div class="result-msg" id="result-msg">—</div>
    <div class="result-stats">
      <div class="rs-box rs-correct"><span class="rs-num" id="rs-correct">0</span><span class="rs-label">Benar</span></div>
      <div class="rs-box rs-wrong"><span class="rs-num" id="rs-wrong">0</span><span class="rs-label">Salah</span></div>
      <div class="rs-box rs-skip"><span class="rs-num" id="rs-skip">0</span><span class="rs-label">Kosong</span></div>
    </div>
    <div>
      <button class="btn-restart" onclick="restartExam()">Ulangi Ujian</button>
      <button class="btn-review" onclick="showReview()">Lihat Pembahasan</button>
    </div>
  </div>
</div>

<div id="review-screen" class="screen">
  <div class="review-header">
    <div class="review-title">Pembahasan Soal</div>
    <button class="btn-back" onclick="backToResult()">← Kembali</button>
  </div>
  <div class="review-body" id="review-body"></div>
</div>

<script>
// ═══════════════════════════════════════════════
// DATA SOAL (Diperbarui dengan array untuk Pilihan Ganda Kompleks)
// ═══════════════════════════════════════════════
const QUESTIONS = [
  { q: "Agresi Militer Belanda I, yang juga dikenal sebagai Operasi Produk, adalah serangan militer Belanda terhadap wilayah Jawa dan Sumatra yang dikuasai oleh Republik Indonesia. Agresi militer Belanda I terjadi pada...", opts: ["14 Desember 1945","25 Oktober 1945","21 Juli 1947","10 November 1945","29 September 1945"], correct: [2] },
  { q: "Pemberontakan PKI di Madiun 1948 berkaitan erat dengan kebijakan Rekonstruksi dan Rasionalisasi Angkatan Perang (RERA). Indikator yang mendukung pernyataan tersebut adalah…", opts: ["Amir Syarifudin menghimpun anggota tentara yang tersingkir untuk melakukan pemberontakan.","Rera akan bermetamorfosis menjadi FDR yang kelak akan melakukan pemberontakan di Madiun.","TNI tidak berhasil menyatukan unsur KNIL ke dalam tubuh APRIS sebagai unsur keamanan RIS.","Kabinet Hatta melakukan pengurangan terhadap TNI yang dianggap menjadi beban anggaran negara.","Rera dipimpin oleh Muso dan Alimin."], correct: [0] },

// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
let current = 0;
let answers = [];
let answered = []; // Untuk mengecek apakah soal ini sudah "dikunci" untuk dicek jawabannya
let timerInterval = null;
let secondsLeft = 90 * 60;
let examDone = false;

// ═══════════════════════════════════════════════
// SCREEN HELPERS
// ═══════════════════════════════════════════════
function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ═══════════════════════════════════════════════
// TIMER
// ═══════════════════════════════════════════════
function startTimer() {
  timerInterval = setInterval(() => {
    secondsLeft--;
    updateTimerDisplay();
    if (secondsLeft <= 0) { clearInterval(timerInterval); finishExam(); }
  }, 1000);
}

function updateTimerDisplay() {
  const m = Math.floor(secondsLeft / 60);
  const s = secondsLeft % 60;
  const box = document.getElementById('timer-box');
  box.textContent = `⏱ ${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  box.className = 'timer-box';
  if (secondsLeft < 300) box.classList.add('warning');
  if (secondsLeft < 60) box.classList.add('danger');
}

// Utilitas mengecek kesamaan dua array (untuk jawaban ganda)
function arraysEqual(a, b) {
  if (a.length !== b.length) return false;
  let sortedA = [...a].sort();
  let sortedB = [...b].sort();
  return sortedA.every((val, index) => val === sortedB[index]);
}

// ═══════════════════════════════════════════════
// START
// ═══════════════════════════════════════════════
function startExam() {
  current = 0;
  answers = QUESTIONS.map(() => []);
  answered = QUESTIONS.map(() => false);
  secondsLeft = 90 * 60;
  examDone = false;
  show('exam-screen');
  buildNavDots();
  renderQuestion();
  startTimer();
}

// ═══════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════
function renderQuestion() {
  const q = QUESTIONS[current];
  const isLocked = answered[current];
  const chosen = answers[current];
  const isMulti = q.correct.length > 1;

  const optLetters = ['A','B','C','D','E'];

  let optsHtml = q.opts.map((opt, i) => {
    let cls = 'option';
    const isChosen = chosen.includes(i);
    
    if (isLocked) {
      cls += ' disabled';
      if (q.correct.includes(i)) {
        cls += ' correct'; // Jawaban yang semestinya benar akan berwarna hijau
      } else if (isChosen && !q.correct.includes(i)) {
        cls += ' wrong';   // Jawaban yang salah dipilih akan merah
      } else if (isChosen) {
        cls += ' selected';
      }
    } else {
      if (isChosen) cls += ' selected';
    }
    
    return `<div class="${cls}" onclick="selectOption(${i})">
      <div class="opt-letter">${optLetters[i]}</div>
      <div class="opt-text">${opt}</div>
    </div>`;
  }).join('');

  let feedbackHtml = '';
  if (isLocked) {
    const correctLetters = q.correct.map(idx => optLetters[idx]).join(', ');
    if (chosen.length === 0) {
      feedbackHtml = `<div class="feedback-box wrong">Soal ini tidak dijawab. Jawaban benar: <b>${correctLetters}</b></div>`;
    } else if (arraysEqual(chosen, q.correct)) {
      feedbackHtml = `<div class="feedback-box correct">✓ Jawaban kamu benar!</div>`;
    } else {
      feedbackHtml = `<div class="feedback-box wrong">✗ Jawaban kurang tepat. Jawaban benar: <b>${correctLetters}</b></div>`;
    }
  }

  let multiInstruction = isMulti ? `<div class="q-instruction">Soal Pilihan Ganda Kompleks: Pilih semua jawaban yang benar.</div>` : '';
  
  let lockBtnHtml = '';
  // Tampilkan tombol kunci khusus soal ganda jika belum terkunci
  if (isMulti && !isLocked) {
    lockBtnHtml = `<div style="margin-top: 1rem;"><button class="btn-nav btn-submit" style="padding: 0.6rem 1.5rem;" onclick="lockAnswer()">Cek Jawaban</button></div>`;
  }

  document.getElementById('exam-body').innerHTML = `
    <div class="q-counter">Soal ${current + 1} dari ${QUESTIONS.length}</div>
    ${multiInstruction}
    <div class="q-text">${q.q}</div>
    <div class="options">${optsHtml}</div>
    ${lockBtnHtml}
    ${feedbackHtml}
  `;

  const answeredCount = answers.filter(a => a.length > 0).length;
  document.getElementById('q-progress').textContent = `Soal ${current+1} / ${QUESTIONS.length}`;
  document.getElementById('q-answered').textContent = `${answeredCount} dijawab`;
  document.getElementById('progress-fill').style.width = `${((current+1)/QUESTIONS.length)*100}%`;

  document.getElementById('btn-prev').disabled = current === 0;
  const isLast = current === QUESTIONS.length - 1;
  const navRight = document.getElementById('btn-next');
  
  if (isLast) {
    navRight.textContent = 'Selesai & Kumpulkan';
    navRight.className = 'btn-nav btn-submit';
    navRight.onclick = finishExam;
  } else {
    navRight.textContent = 'Berikutnya →';
    navRight.className = 'btn-nav btn-next';
    navRight.onclick = () => navigate(1);
  }

  updateNavDots();
}

// ═══════════════════════════════════════════════
// SELECT OPTION
// ═══════════════════════════════════════════════
function selectOption(i) {
  if (answered[current]) return; // Jika sudah dikunci, abaikan
  
  const q = QUESTIONS[current];
  const isMulti = q.correct.length > 1;

  if (isMulti) {
    const idx = answers[current].indexOf(i);
    if (idx > -1) answers[current].splice(idx, 1); // uncheck
    else answers[current].push(i); // check
  } else {
    answers[current] = [i];
    answered[current] = true; // Auto-lock untuk soal single choice
  }
  
  renderQuestion();
}

function lockAnswer() {
  if (answers[current].length === 0) return;
  answered[current] = true;
  renderQuestion();
}

// ═══════════════════════════════════════════════
// NAVIGATE
// ═══════════════════════════════════════════════
function navigate(dir) {
  const next = current + dir;
  if (next < 0 || next >= QUESTIONS.length) return;
  current = next;
  renderQuestion();
}

// ═══════════════════════════════════════════════
// NAV DOTS
// ═══════════════════════════════════════════════
function buildNavDots() {
  const wrap = document.getElementById('nav-dots');
  wrap.innerHTML = '';
  QUESTIONS.forEach((_, i) => {
    const d = document.createElement('button');
    d.className = 'nav-dot';
    d.title = `Soal ${i+1}`;
    d.onclick = () => { current = i; renderQuestion(); };
    wrap.appendChild(d);
  });
}

function updateNavDots() {
  const dots = document.getElementById('nav-dots').querySelectorAll('.nav-dot');
  dots.forEach((d, i) => {
    d.className = 'nav-dot';
    if (examDone) {
      if (answers[i].length === 0) d.classList.add('answered');
      else if (arraysEqual(answers[i], QUESTIONS[i].correct)) d.classList.add('correct-dot');
      else d.classList.add('wrong-dot');
    } else {
      if (i === current) d.classList.add('current');
      else if (answers[i].length > 0) d.classList.add('answered');
    }
  });
}

// ═══════════════════════════════════════════════
// FINISH
// ═══════════════════════════════════════════════
function finishExam() {
  clearInterval(timerInterval);
  examDone = true;
  answered = answered.map(() => true); // Kunci semua

  let correct = 0, wrong = 0, skip = 0;
  QUESTIONS.forEach((q, i) => {
    if (answers[i].length === 0) skip++;
    else if (arraysEqual(answers[i], q.correct)) correct++;
    else wrong++;
  });

  const score = Math.round((correct / QUESTIONS.length) * 100);
  let verdict, msg, color;
  if (score >= 90) { verdict = 'Luar Biasa!'; msg = 'Penguasaan materimu sangat baik. Pertahankan!'; color = '#1a6644'; }
  else if (score >= 75) { verdict = 'Bagus!'; msg = 'Nilai kamu memuaskan. Pelajari soal yang salah untuk hasil sempurna.'; color = '#c9a84c'; }
  else if (score >= 60) { verdict = 'Cukup'; msg = 'Kamu perlu mengulang materi yang masih lemah. Review pembahasan ya!'; color = '#e65100'; }
  else { verdict = 'Perlu Belajar Lebih'; msg = 'Jangan menyerah! Review semua soal dan pelajari materinya kembali.'; color = '#8b1a1a'; }

  document.getElementById('result-grade').textContent = score;
  document.getElementById('result-grade').style.color = color;
  document.getElementById('result-verdict').textContent = verdict;
  document.getElementById('result-verdict').style.color = color;
  document.getElementById('result-msg').textContent = msg;
  document.getElementById('rs-correct').textContent = correct;
  document.getElementById('rs-wrong').textContent = wrong;
  document.getElementById('rs-skip').textContent = skip;

  show('result-screen');
}

// ═══════════════════════════════════════════════
// REVIEW
// ═══════════════════════════════════════════════
function showReview() {
  const body = document.getElementById('review-body');
  const letters = ['A','B','C','D','E'];
  let html = '';
  QUESTIONS.forEach((q, i) => {
    const ua = answers[i];
    const ca = q.correct;
    let cls = 'review-item ';
    let status = '';
    
    if (ua.length === 0) { cls += 'rev-skip'; status = `⬦ Kosong`; }
    else if (arraysEqual(ua, ca)) { cls += 'rev-correct'; status = `✓ Benar`; }
    else { cls += 'rev-wrong'; status = `✗ Salah`; }

    const userAnsStr = ua.map(idx => `${letters[idx]}. ${q.opts[idx]}`).join('<br>');
    const correctAnsStr = ca.map(idx => `${letters[idx]}. ${q.opts[idx]}`).join('<br>');

    html += `<div class="${cls}">
      <div class="review-q-num">Soal ${i+1} · ${status}</div>
      <div class="review-q-text">${q.q}</div>
      <div class="review-answers">
        ${!arraysEqual(ua, ca) && ua.length > 0 ? `<div class="rev-your">Jawaban kamu:<br>${userAnsStr}</div>` : ''}
        <div class="rev-correct-ans">✓ Jawaban benar:<br>${correctAnsStr}</div>
      </div>
    </div>`;
  });
  body.innerHTML = html;
  show('review-screen');
}

function backToResult() { show('result-screen'); }
function restartExam() { startExam(); }
</script>
